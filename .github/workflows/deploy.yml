name: Deploy to Vercel

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

# Required repository secrets:
#   VERCEL_TOKEN      — Vercel personal access token (vercel.com → Settings → Tokens)
#   VERCEL_ORG_ID     — Team/personal ID (vercel.com → Settings → General → Team ID)
#   VERCEL_PROJECT_ID — Project ID (project → Settings → General → Project ID)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          ENV=$([[ "${{ github.ref }}" == "refs/heads/master" ]] && echo "production" || echo "preview")
          vercel pull --yes --environment=$ENV --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Vercel Preview: ${{ steps.deploy.outputs.url }}`
            })
